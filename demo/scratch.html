<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>klaut liquid glass — scratch pipeline</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(10, 12, 18, 0.78);
        --ink: #e8eef8;
        --muted: #9aa8bc;
        --accent: #7ec8ff;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #9eb0cc;
        color: var(--ink);
      }
      #c {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: block;
        width: 100%;
        height: 100%;
        background: #1a2233;
      }
      .hud {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 5;
        pointer-events: auto;
        width: min(340px, calc(100vw - 32px));
        padding: 14px 16px 16px;
        border-radius: 14px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      .hud h1 {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: -0.02em;
      }
      .hud .sub {
        margin: 0 0 12px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }
      .stages {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }
      .stages button {
        font: inherit;
        font-size: 11px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
        cursor: pointer;
      }
      .stages button.active {
        border-color: rgba(126, 200, 255, 0.55);
        background: rgba(126, 200, 255, 0.18);
        color: #dff2ff;
      }
      .stages button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      label.row {
        display: grid;
        grid-template-columns: 88px 1fr 42px;
        gap: 8px;
        align-items: center;
        font-size: 12px;
        margin: 8px 0;
        color: var(--muted);
      }
      label.row input[type="range"] { width: 100%; }
      label.row span { font-variant-numeric: tabular-nums; color: var(--ink); text-align: right; }
      .hint {
        margin-top: 10px;
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
      }
      .hint code {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 10px;
        color: var(--accent);
      }
      .badge {
        display: inline-block;
        margin-left: 6px;
        padding: 1px 7px;
        border-radius: 999px;
        font-size: 10px;
        background: rgba(126, 200, 255, 0.15);
        color: var(--accent);
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <aside class="hud">
      <h1>Scratch pipeline <span class="badge" id="stageBadge">stage 1</span></h1>
      <p class="sub">
        Font: <strong>Arial Black</strong> · wordmark <strong>klaut.pro</strong><br />
        Blender extrude → Three.js orbit → glass → liquid → drip
      </p>
      <div class="stages" id="stageButtons">
        <button type="button" data-stage="1">1 Font</button>
        <button type="button" data-stage="2">2 Rotate</button>
        <button type="button" data-stage="3">3 Glass</button>
        <button type="button" data-stage="4">4 Liquid</button>
        <button type="button" data-stage="5">5 Drip</button>
      </div>
      <label class="row">
        Liquify
        <input id="liquify" type="range" min="0" max="1" step="0.01" value="0.35" />
        <span id="liquifyVal">0.35</span>
      </label>
      <label class="row">
        Viscosity
        <input id="viscosity" type="range" min="0.05" max="1" step="0.01" value="0.45" />
        <span id="viscosityVal">0.45</span>
      </label>
      <label class="row">
        IOR
        <input id="ior" type="range" min="1.05" max="1.55" step="0.01" value="1.33" />
        <span id="iorVal">1.33</span>
      </label>
      <p class="hint">
        Drag to orbit · scroll to zoom · right-drag to pan<br />
        Stage 5: continuum emitters + softMin necks (<code>DripSim</code>)<br />
        Mesh: <code>demo/scratch/mesh/wordmark-klaut-pro.glb</code>
      </p>
    </aside>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
      // Rank-1 continuum drips (docs/drop-modeling-research.md)
      import {
        DripSim,
        MAX_DRIP_BLOBS,
        viscosityMaps,
      } from "../dist/field/DripSim.js";

      const WORDMARK = "klaut.pro";
      const GLB_PATH = "./scratch/mesh/wordmark-klaut-pro.glb";
      /**
       * Approximate Arial Black glyph-center fractions for "klaut.pro"
       * (−1…1 across half-width). Period + p get extra intensity (descenders).
       */
      const WORDMARK_EMITTER_FRACS = [
        { x: -0.88, intensity: 0.95 }, // k
        { x: -0.68, intensity: 0.85 }, // l
        { x: -0.48, intensity: 0.9 }, // a
        { x: -0.28, intensity: 0.9 }, // u
        { x: -0.1, intensity: 1.0 }, // t
        { x: 0.05, intensity: 1.15 }, // .
        { x: 0.28, intensity: 1.25 }, // p (descender)
        { x: 0.5, intensity: 0.95 }, // r
        { x: 0.74, intensity: 1.0 }, // o
      ];

      const canvas = document.getElementById("c");
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
        powerPreference: "high-performance",
        // Needed so screenshots / some software GL paths keep the last frame visible
        preserveDrawingBuffer: true,
      });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight, false);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      // Higher exposure so transmission glass doesn't read as black-on-black
      renderer.toneMappingExposure = 1.55;

      const scene = new THREE.Scene();
      // Bright studio wash — glass needs light to refract; dark navy made the mark vanish
      scene.background = new THREE.Color(0x9eb0cc);
      scene.fog = new THREE.Fog(0x9eb0cc, 22, 48);

      // Wider FOV for the long wordmark
      const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.05, 80);
      camera.position.set(0, 0.55, 7.2);

      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 2.5;
      controls.maxDistance = 28;
      controls.target.set(0, 0.05, 0);

      // Bright backplate so transmission has colored light to bend (wide for wordmark)
      const backplate = new THREE.Mesh(
        new THREE.PlaneGeometry(28, 10),
        new THREE.MeshStandardMaterial({
          color: 0xd8e4f5,
          roughness: 0.88,
          metalness: 0,
          emissive: 0x6a86b0,
          emissiveIntensity: 0.28,
        }),
      );
      backplate.position.set(0, 1.0, -3.2);
      scene.add(backplate);

      // Soft studio-ish plate so glass has something to refract/reflect
      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(14, 64),
        new THREE.MeshStandardMaterial({
          color: 0xd2dcec,
          roughness: 0.5,
          metalness: 0.04,
        }),
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -1.35;
      scene.add(floor);

      const grid = new THREE.GridHelper(20, 40, 0x7a8aa8, 0xb8c4d8);
      grid.position.y = -1.349;
      scene.add(grid);

      const key = new THREE.DirectionalLight(0xfff6ea, 3.2);
      key.position.set(4.5, 5.5, 3.5);
      scene.add(key);
      const rim = new THREE.DirectionalLight(0xffffff, 1.6);
      rim.position.set(-3.5, 3.5, 5);
      scene.add(rim);
      const fill = new THREE.DirectionalLight(0xb8d4ff, 1.4);
      fill.position.set(-5, 2, -2);
      scene.add(fill);
      scene.add(new THREE.AmbientLight(0xffffff, 0.55));
      scene.add(new THREE.HemisphereLight(0xffffff, 0xa8b4c8, 0.85));

      const pmrem = new THREE.PMREMGenerator(renderer);
      // Brighter room env for clear specular + refraction on MeshPhysicalMaterial
      scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.02).texture;
      scene.environmentIntensity = 1.35;
      pmrem.dispose();

      /** @type {THREE.Object3D | null} */
      let letterRoot = null;
      /** @type {THREE.Mesh[]} */
      let letterMeshes = [];
      /** @type {{ pos: Float32Array, base: Float32Array, normal: Float32Array }[]} */
      let deformCache = [];
      /** World-space half-width / height of wordmark (for drip field space) */
      let wordHalfW = 2.5;
      let wordHalfH = 0.95;
      let wordAttachY = -0.85;
      /** @type {DripSim} */
      const dripSim = new DripSim(WORDMARK_EMITTER_FRACS.length);

      const matSolid = new THREE.MeshStandardMaterial({
        color: 0xc8d0dc,
        roughness: 0.35,
        metalness: 0.15,
      });

      // Slightly imperfect glass: full transmission + dark env reads as empty canvas.
      // Keep transmission high but tint + env intensity so the silhouette is obvious.
      const matGlass = new THREE.MeshPhysicalMaterial({
        color: 0xf2f7ff,
        metalness: 0,
        roughness: 0.06,
        transmission: 0.92,
        thickness: 0.65,
        ior: 1.33,
        specularIntensity: 1,
        envMapIntensity: 2.1,
        clearcoat: 1,
        clearcoatRoughness: 0.04,
        attenuationColor: new THREE.Color(0xb8d8ff),
        attenuationDistance: 1.6,
        transparent: true,
        opacity: 1,
        side: THREE.DoubleSide,
      });

      const matLiquid = matGlass.clone();
      matLiquid.roughness = 0.09;
      matLiquid.thickness = 0.9;
      matLiquid.transmission = 0.88;
      matLiquid.attenuationColor = new THREE.Color(0xa8d0ff);
      matLiquid.envMapIntensity = 2.35;

      // Stage 5: DripSim metaball blobs as glass spheres (softMin-style overlap)
      const dripGroup = new THREE.Group();
      dripGroup.visible = false;
      scene.add(dripGroup);
      const dripMat = matLiquid.clone();
      const dripSphereGeo = new THREE.SphereGeometry(1, 22, 16);
      /** @type {THREE.Mesh[]} */
      const dripPool = [];
      for (let i = 0; i < MAX_DRIP_BLOBS; i++) {
        const m = new THREE.Mesh(dripSphereGeo, dripMat);
        m.visible = false;
        m.frustumCulled = false;
        dripGroup.add(m);
        dripPool.push(m);
      }

      /**
       * Refine emitter X from mesh bottom-edge samples (descenders hang lower).
       * Falls back to WORDMARK_EMITTER_FRACS when sampling is sparse.
       */
      function sampleBottomEmitters(meshes) {
        const v = new THREE.Vector3();
        let minY = Infinity;
        let maxY = -Infinity;
        let minX = Infinity;
        let maxX = -Infinity;
        /** @type {{ x: number, y: number }[]} */
        const pts = [];
        for (const mesh of meshes) {
          const pos = mesh.geometry.attributes.position;
          mesh.updateWorldMatrix(true, false);
          for (let i = 0; i < pos.count; i++) {
            v.fromBufferAttribute(pos, i).applyMatrix4(mesh.matrixWorld);
            pts.push({ x: v.x, y: v.y });
            minY = Math.min(minY, v.y);
            maxY = Math.max(maxY, v.y);
            minX = Math.min(minX, v.x);
            maxX = Math.max(maxX, v.x);
          }
        }
        const halfW = Math.max((maxX - minX) * 0.5, 0.5);
        const halfH = Math.max((maxY - minY) * 0.5, 0.4);
        const attachY = minY + (maxY - minY) * 0.04;
        const band = minY + (maxY - minY) * 0.18;
        const bottom = pts.filter((p) => p.y <= band);
        const bins = WORDMARK_EMITTER_FRACS.length;
        /** @type {{ x: number, y: number, n: number }[]} */
        const accum = Array.from({ length: bins }, () => ({ x: 0, y: 0, n: 0 }));
        for (const p of bottom) {
          const nx = ((p.x - minX) / Math.max(maxX - minX, 1e-6)) * (bins - 1);
          const bi = Math.min(bins - 1, Math.max(0, Math.round(nx)));
          accum[bi].x += p.x;
          accum[bi].y += p.y;
          accum[bi].n += 1;
        }
        const emitters = WORDMARK_EMITTER_FRACS.map((spec, i) => {
          const a = accum[i];
          const useSample = a.n >= 4;
          const worldX = useSample ? a.x / a.n : spec.x * halfW;
          // Prefer lower lips (descenders) — boost intensity when bin sits low
          const lipY = useSample ? a.y / a.n : attachY;
          const hang = THREE.MathUtils.clamp((attachY - lipY) / Math.max(halfH, 1e-3), 0, 1);
          const startStretch = i % 3 === 0 || hang > 0.08;
          return {
            x: worldX,
            normalized: false,
            intensity: spec.intensity * (1 + hang * 0.35),
            phaseOffset: (i * 0.13) % 1,
            stretchScale: 1 + hang * 0.25,
            locked: false,
            enabled: true,
            // Seed pendants mid-stretch so stage-5 reads immediately
            startInStretch: startStretch,
            stretchT: startStretch ? 0.38 + (i % 4) * 0.1 : 0,
          };
        });
        return { emitters, halfW, halfH, attachY, minY, maxY };
      }

      function configureDripSim() {
        const sampled = letterMeshes.length
          ? sampleBottomEmitters(letterMeshes)
          : null;
        if (sampled) {
          wordHalfW = sampled.halfW;
          wordHalfH = sampled.halfH;
          wordAttachY = sampled.attachY;
          dripSim.setControl({
            mode: "controlled",
            isolate: true,
            deterministic: false,
            attachY: sampled.attachY,
            emitters: sampled.emitters,
          });
        } else {
          dripSim.setControl({
            mode: "controlled",
            isolate: true,
            attachY: wordAttachY,
            emitters: WORDMARK_EMITTER_FRACS.map((spec, i) => ({
              x: spec.x,
              normalized: true,
              intensity: spec.intensity,
              phaseOffset: (i * 0.13) % 1,
              stretchScale: 1,
            })),
          });
        }
        dripSim.reset();
      }

      let stage = 3; // ship with glass on by default (stages 1–3 done)
      let liquifyAmt = 0.35;
      let viscosity = 0.45;

      function applyMaterial() {
        const mat =
          stage <= 2 ? matSolid : stage === 3 ? matGlass : matLiquid;
        for (const mesh of letterMeshes) {
          mesh.material = mat;
        }
        dripMat.copy(matLiquid);
        dripMat.needsUpdate = true;
        dripGroup.visible = stage >= 5;
      }

      function setStage(next) {
        stage = next;
        document.getElementById("stageBadge").textContent = `stage ${stage}`;
        for (const btn of document.querySelectorAll("#stageButtons button")) {
          btn.classList.toggle("active", Number(btn.dataset.stage) === stage);
        }
        applyMaterial();
        // Stage 1–2: no liquify deformation; 4+ enables
        if (stage < 4) resetDeform();
        if (stage >= 5) configureDripSim();
        else {
          for (const m of dripPool) m.visible = false;
        }
      }

      function resetDeform() {
        for (const entry of deformCache) {
          entry.pos.set(entry.base);
        }
        for (const mesh of letterMeshes) {
          mesh.geometry.attributes.position.needsUpdate = true;
          mesh.geometry.computeVertexNormals();
        }
      }

      function applyLiquify(t) {
        if (stage < 4 || liquifyAmt < 0.001) {
          if (stage < 4) resetDeform();
          return;
        }
        const amt = liquifyAmt;
        for (let mi = 0; mi < letterMeshes.length; mi++) {
          const mesh = letterMeshes[mi];
          const { pos, base, normal } = deformCache[mi];
          for (let i = 0; i < pos.length; i += 3) {
            const x = base[i];
            const y = base[i + 1];
            const z = base[i + 2];
            const nx = normal[i];
            const ny = normal[i + 1];
            const nz = normal[i + 2];
            // Soft viscous ripple + downward melt bias (metaball-ish read)
            const w =
              Math.sin(x * 2.4 + t * 1.1) *
                Math.cos(z * 3.6 + t * 0.85) *
                0.55 +
              Math.sin((x + z) * 1.6 - t * 0.7) * 0.35;
            const melt = Math.max(0, -y) * 0.1 * amt;
            const push = (0.035 * amt * w - melt * 0.35) * (0.55 + 0.45 * Math.max(0, -ny));
            pos[i] = x + nx * push;
            pos[i + 1] = y + ny * push * 0.85 - melt;
            pos[i + 2] = z + nz * push;
          }
          mesh.geometry.attributes.position.needsUpdate = true;
          mesh.geometry.computeVertexNormals();
        }
      }

      function updateDrips(dt) {
        if (stage < 5) {
          for (const m of dripPool) m.visible = false;
          return;
        }
        // Viscosity slider → Oh maps (rate, neck length, blob size) via DripSim
        const dripAmt = THREE.MathUtils.clamp(0.55 + liquifyAmt * 0.45, 0.35, 1);
        const blobs = dripSim.step(Math.min(dt, 0.05), {
          drip: dripAmt,
          liquify: liquifyAmt,
          viscosity,
          halfW: wordHalfW,
          halfH: wordHalfH,
          reducedMotion: false,
        });
        const maps = viscosityMaps(viscosity, dripAmt);
        // softMin k → slight radius plump when blobs sit close (metaball read)
        const k = maps.mergeK * wordHalfH;
        for (let i = 0; i < dripPool.length; i++) {
          const mesh = dripPool[i];
          const b = blobs[i];
          if (!b || b.w < 0.04) {
            mesh.visible = false;
            continue;
          }
          let r = b.r * (0.85 + 0.35 * b.w);
          // Neighbor plump (CPU softMin proxy — spheres overlap into a neck)
          for (let j = 0; j < blobs.length; j++) {
            if (j === i) continue;
            const o = blobs[j];
            if (!o || o.w < 0.04) continue;
            const d = Math.hypot(b.x - o.x, b.y - o.y);
            const reach = b.r + o.r + k * 2.2;
            if (d < reach && d > 1e-5) {
              const h = Math.max(0, 1 - d / reach);
              r += k * h * h * 0.55;
            }
          }
          mesh.visible = true;
          mesh.position.set(b.x, b.y, 0.06);
          mesh.scale.setScalar(Math.max(r, 0.012));
        }
        if (window.__scratch) {
          window.__scratch.dripBlobs = blobs.length;
          window.__scratch.viscosity = viscosity;
          window.__scratch.maps = {
            stretchLen: maps.stretchLen,
            dropR: maps.dropR,
            detachNeck: maps.detachNeck,
            mergeK: maps.mergeK,
          };
        }
      }

      function frameWordmarkCamera(size) {
        // Frame by height so letters stay readable; pull back for width
        const aspect = camera.aspect || 16 / 9;
        const vFov = THREE.MathUtils.degToRad(camera.fov);
        const fitH = size.y * 1.55;
        const fitW = size.x * 1.15;
        const distH = fitH / (2 * Math.tan(vFov / 2));
        const distW = fitW / (2 * Math.tan(vFov / 2) * aspect);
        const dist = Math.max(distH, distW, 4.5);
        camera.position.set(0, size.y * 0.15, dist);
        controls.minDistance = Math.max(2.2, dist * 0.35);
        controls.maxDistance = dist * 3.2;
        controls.target.set(0, 0.02, 0);
        controls.update();
      }

      async function loadLetter() {
        const loader = new GLTFLoader();
        // Absolute-from-demo path survives serve's /scratch.html → /scratch redirect
        const glbUrl = new URL(GLB_PATH, import.meta.url).href;
        const gltf = await loader.loadAsync(glbUrl);
        letterRoot = gltf.scene;
        letterRoot.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = false;
            obj.receiveShadow = false;
            letterMeshes.push(obj);
            const posAttr = obj.geometry.attributes.position;
            const nAttr = obj.geometry.attributes.normal;
            const base = posAttr.array.slice(0);
            const normal = nAttr ? nAttr.array.slice(0) : new Float32Array(base.length);
            deformCache.push({ pos: posAttr.array, base, normal });
          }
        });
        if (!letterMeshes.length) {
          throw new Error("GLB loaded but contained no meshes");
        }
        // Normalize by HEIGHT so the wide wordmark stays readable (not crushed by maxDim)
        const box = new THREE.Box3().setFromObject(letterRoot);
        const size0 = box.getSize(new THREE.Vector3());
        const targetH = 1.85;
        const scale = targetH / Math.max(size0.y, 1e-6);
        letterRoot.scale.multiplyScalar(scale);
        box.setFromObject(letterRoot);
        const center = box.getCenter(new THREE.Vector3());
        letterRoot.position.sub(center);
        letterRoot.position.y += 0.08;
        const size = box.getSize(new THREE.Vector3());
        wordHalfW = size.x * 0.5;
        wordHalfH = size.y * 0.5;
        configureDripSim();
        scene.add(letterRoot);
        applyMaterial();
        frameWordmarkCamera(size);
        // Expose for Playwright readability checks
        window.__scratch = {
          wordmark: WORDMARK,
          mesh: GLB_PATH,
          size: { x: size.x, y: size.y, z: size.z },
          attachY: wordAttachY,
          emitters: dripSim.getControl().emitters?.length ?? 0,
          ready: true,
          dripBlobs: 0,
        };
      }

      // UI
      const liquifyEl = document.getElementById("liquify");
      const viscosityEl = document.getElementById("viscosity");
      const iorEl = document.getElementById("ior");
      liquifyEl.addEventListener("input", () => {
        liquifyAmt = Number(liquifyEl.value);
        document.getElementById("liquifyVal").textContent = liquifyAmt.toFixed(2);
      });
      viscosityEl.addEventListener("input", () => {
        viscosity = Number(viscosityEl.value);
        document.getElementById("viscosityVal").textContent = viscosity.toFixed(2);
      });
      iorEl.addEventListener("input", () => {
        const ior = Number(iorEl.value);
        document.getElementById("iorVal").textContent = ior.toFixed(2);
        matGlass.ior = ior;
        matLiquid.ior = ior;
        dripMat.ior = ior;
      });
      for (const btn of document.querySelectorAll("#stageButtons button")) {
        btn.addEventListener("click", () => setStage(Number(btn.dataset.stage)));
      }

      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight, false);
        if (letterRoot) {
          const box = new THREE.Box3().setFromObject(letterRoot);
          frameWordmarkCamera(box.getSize(new THREE.Vector3()));
        }
      });

      const clock = new THREE.Clock();
      function frame() {
        const dt = clock.getDelta();
        const t = clock.getElapsedTime();
        controls.update();
        applyLiquify(t);
        updateDrips(dt);
        renderer.render(scene, camera);
        requestAnimationFrame(frame);
      }

      try {
        await loadLetter();
        setStage(5);
        // Bias toward visible mid-stretch pendants for first paint / QA
        liquifyAmt = 0.55;
        liquifyEl.value = String(liquifyAmt);
        document.getElementById("liquifyVal").textContent = liquifyAmt.toFixed(2);
        frame();
      } catch (err) {
        console.error(err);
        document.querySelector(".sub").textContent =
          "Failed to load wordmark-klaut-pro.glb — run npm run bake:scratch first.";
        window.__scratch = { wordmark: WORDMARK, ready: false, error: String(err) };
      }
    </script>
  </body>
</html>
